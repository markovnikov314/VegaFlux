syntax = "proto3";
package vegaflux.v1;
option java_package = "invalid.policy.test";

message CanonicalMarketEvent {
  enum EventType {
    EVENT_UNSPECIFIED = 0;
    ADD = 11;
  }

  enum Side {
    SIDE_UNSPECIFIED = 0;
    BID = 1;
    ASK = 2;
  }

  string schema_version = 1;
  string venue = 2 [deprecated = true];
  string venue_alias = 2;
}
